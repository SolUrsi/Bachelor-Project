services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: traftec-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  postgres:
    image: postgres:16-alpine
    container_name: traftec-postgres
    environment:
      POSTGRES_DB:       traftec_training
      POSTGRES_USER:     training
      POSTGRES_PASSWORD: training123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U training -d traftec_training"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-service:
    build: .
    container_name: traftec-db-service
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      MQTT_HOST:         mosquitto
      MQTT_PORT:         "1883"
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       traftec_training
      POSTGRES_USER:     training
      POSTGRES_PASSWORD: training123
    restart: unless-stopped

volumes:
  postgres_data:
